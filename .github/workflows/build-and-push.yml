name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - '.github/workflows/build-and-push.yml'
      - 'VERSION'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker/**'
      - '.github/workflows/build-and-push.yml'
      - 'VERSION'
  schedule:
    # Auto build at 2 AM every Sunday
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      update_lockfile:
        description: 'Update uv.lock file before building'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.version.outputs.version_changed }}
      should_build: ${{ steps.version.outputs.should_build }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # fetch-depth: 0 only when full history is absolutely required.
        # It is necessary for version/tag comparison (e.g., git tag -l),
        # the default fetch-depth: 1 is for shallow clone
        fetch-depth: 0

    - name: Read VERSION file and check for changes
      id: version
      run: |
        if [ ! -f VERSION ]; then
          echo "VERSION file not found!"
          exit 1
        fi

        CURRENT_VERSION=$(cat VERSION | tr -d '\n')
        echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

        # Check if this version tag already exists
        if git tag -l | grep -q "^v$CURRENT_VERSION$"; then
          echo "version_changed=false" >> $GITHUB_OUTPUT
          echo "Tag v$CURRENT_VERSION already exists"
        else
          echo "version_changed=true" >> $GITHUB_OUTPUT
          echo "New version detected: $CURRENT_VERSION"
        fi

        # Determine if we should build
        if [[ "${{ github.event_name }}" == "schedule" ]] || \
           [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
           [[ "${{ github.event_name }}" == "pull_request" ]] || \
           [[ "${{ steps.version.outputs.version_changed }}" == "true" ]]; then
          echo "should_build=true" >> $GITHUB_OUTPUT
        else
          echo "should_build=false" >> $GITHUB_OUTPUT
        fi

  update-lockfile:
    runs-on: ubuntu-latest
    if: github.event.inputs.update_lockfile == 'true' || github.event.schedule

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Update lock file
      run: |
        cd docker
        uv lock --upgrade

    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit updated lock file
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docker/uv.lock
        git commit -m "chore: update uv.lock file"
        git push

  create-tag:
    runs-on: ubuntu-latest
    needs: [check-version, update-lockfile]
    if: always() && needs.check-version.outputs.version_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.update-lockfile.result == 'success' || needs.update-lockfile.result == 'skipped')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release version ${{ needs.check-version.outputs.version }}"
        git push origin "v${{ needs.check-version.outputs.version }}"

  build:
    runs-on: ubuntu-latest
    needs: [update-lockfile]
    if: always() && (needs.update-lockfile.result == 'success' || needs.update-lockfile.result == 'skipped')
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
      image-labels: ${{ steps.meta.outputs.labels }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Read VERSION file
      id: version
      run: |
        if [ -f VERSION ]; then
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
        else
          echo "version=latest" >> $GITHUB_OUTPUT
        fi

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=pep440,pattern={{version}}
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=Molecule Tox Runner
          org.opencontainers.image.description=Docker image for Ansible Molecule testing with tox (built with uv)
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        provenance: true
        sbom: true

    - name: Generate SBOM
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.digest }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v3
      with:
        name: sbom
        path: sbom.spdx.json

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker image
      run: |
        # Extract platform-specific image
        PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')

        # Test basic functionality
        docker run --rm --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }} tox --version
        docker run --rm --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }} molecule --version
        docker run --rm --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }} ansible-lint --version
        docker run --rm --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }} yamllint --version

        # Test entrypoint
        docker run --rm --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}

  security-scan:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
